<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratama Digital Printing & Advertising</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#0d6efd;
    color:white;
    padding:15px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav img{
    width:70px;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.hero{
    background:#222;
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:45px;
}

.hero p{
    margin-top:15px;
    font-size:20px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:orange;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

section{
    padding:50px;
}

.judul{
    text-align:center;
    margin-bottom:30px;
    color:#0d6efd;
}

.layanan{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

footer{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>
<body>
